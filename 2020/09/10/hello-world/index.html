            <!-- Content -->
            <p><img src="/2020/09/10/hello-world/hello-world.jpg" alt="图片实拍"><br>Welcome!欢迎来到我们的网站，我会在这里写一些感想这类的杂记和讲章。</p>
<h2 id="关于我们"><a href="#关于我们" class="headerlink" title="关于我们"></a>关于我们</h2><h3 id="异象"><a href="#异象" class="headerlink" title="异象"></a>异象</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">建立耶稣基督的身体、传扬神国的福音。 </span><br></pre></td></tr></table></figure>

<h3 id="使命"><a href="#使命" class="headerlink" title="使命"></a>使命</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">依靠上帝的话语和圣灵的能力，</span><br><span class="line">来建造基督的身体；</span><br><span class="line">使被压制的得自由、被掳的释放，</span><br><span class="line">满有能力的传天国的好消息。</span><br></pre></td></tr></table></figure>

<h3 id="策略"><a href="#策略" class="headerlink" title="策略"></a>策略</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">注重主日和小组的双重牧养，</span><br><span class="line">以火热的祷告和弟兄姐妹</span><br><span class="line">一同经历神的同在和医治释放，</span><br><span class="line">并在小组中彼此接纳、建立相爱的关系。</span><br></pre></td></tr></table></figure>

<h3 id="核心价值"><a href="#核心价值" class="headerlink" title="核心价值"></a>核心价值</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">尊容接纳不掌控</span><br><span class="line">轻松自由传福音</span><br><span class="line">医治释放得自由</span><br><span class="line">圣灵充满得永生</span><br></pre></td></tr></table></figure>

<h3 id="聚会时间"><a href="#聚会时间" class="headerlink" title="聚会时间"></a>聚会时间</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">主日聚会  周日下午3:00-4:30</span><br><span class="line">启发小组  周二晚上6:30-8:30</span><br></pre></td></tr></table></figure>

<h3 id="信仰告白"><a href="#信仰告白" class="headerlink" title="信仰告白"></a>信仰告白</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br></pre></td><td class="code"><pre><span class="line">关于救恩</span><br><span class="line">我们相信真心接受耶稣基督使神的儿子，</span><br><span class="line">为我们的罪，来到这个世界，</span><br><span class="line">并为我们钉死在十架上，</span><br><span class="line">三日后从死里复活，</span><br><span class="line">使我们信他的热成为神的儿女，</span><br><span class="line">得着天国永生。</span><br><span class="line"></span><br><span class="line">我们相信神会保守真心信靠他的人，</span><br><span class="line">持守我们的信仰，不至于退后入沉沦；</span><br><span class="line">我们相信得救的人，也会有软弱和犯罪，</span><br><span class="line">但内心会生发出使人得救的懊悔，</span><br><span class="line">以至于能悔改活出新的生命。</span><br><span class="line"></span><br><span class="line">我们相信，真心接受耶稣基督的人，</span><br><span class="line">不是那等入沉沦之人；</span><br><span class="line">我们同时也相信在教会中，</span><br><span class="line">不是争论神学的观念，</span><br><span class="line">而是要不断的在基督的爱中彼此鼓励，</span><br><span class="line">仅仅跟随耶稣基督，并委身在教会，</span><br><span class="line">参与服侍，活出像基督一样不断给予的新生命。</span><br><span class="line"></span><br><span class="line">关于洗礼</span><br><span class="line">我们相信，信的人需要接受洗礼；</span><br><span class="line">洗礼是我们的旧人已经与基督</span><br><span class="line">一同钉死在十架上，</span><br><span class="line">我们里面现在活着的不再是老旧人，</span><br><span class="line">乃是基督在我们里面活着，</span><br><span class="line">使我们成为新造的人，</span><br><span class="line">与基督一同复活。</span><br><span class="line"></span><br><span class="line">关于基督</span><br><span class="line">耶稣基督完全的人、完全的神，</span><br><span class="line">是三一神有形有体的彰显，</span><br><span class="line">为我们罪钉死、复活、升天，</span><br><span class="line">担当我们一切的罪，</span><br><span class="line">使信他的人能够承受永生。</span><br><span class="line"></span><br><span class="line">关于圣餐</span><br><span class="line">圣餐的饼和杯，预表我们领受耶稣的身体，</span><br><span class="line">为我们受的鞭伤，流出的宝血。</span><br><span class="line">使我们领受耶稣基督所付上的代价，</span><br><span class="line">使我们有永恒的生命。</span><br><span class="line"></span><br><span class="line">我们相信圣餐是神给每个弟兄姐妹的祝福，</span><br><span class="line">真心悔改的基督徒人人需要领受圣餐；</span><br><span class="line">我们相信任何的原因</span><br><span class="line">都不能拦阻人领受基督的身体和宝血。</span><br><span class="line"></span><br><span class="line">关于婚姻</span><br><span class="line">“因此，人要离开父母与妻子连合，</span><br><span class="line">二人成为一体。”(创2:24)</span><br><span class="line">婚姻应该是在基督里面的彼此联合。</span><br><span class="line"></span><br><span class="line">关于离婚</span><br><span class="line">我们相信基督徒的婚姻是神所赐的，</span><br><span class="line">但如果我们和未信主的人已经结婚了，</span><br><span class="line">基督徒不可以离开不信的配偶。</span><br><span class="line"></span><br><span class="line">但圣经说到，</span><br><span class="line">倘若那不信的人要离去，</span><br><span class="line">就由他离去吧！</span><br><span class="line">无论是弟兄，是姐妹，</span><br><span class="line">遇着这样的事都不必拘束。（林前7:15）</span><br></pre></td></tr></table></figure>
